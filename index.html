<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Seller · Falabella Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0f1e; --surface:#111827; --surface2:#1a2235; --border:#1e2d45;
    --green:#00c472; --green-dim:rgba(0,196,114,0.12); --green-glow:rgba(0,196,114,0.25);
    --text:#e8edf5; --muted:#6b7a99; --accent:#3b82f6;
    --red:#ef4444; --red-dim:rgba(239,68,68,0.12); --red-glow:rgba(239,68,68,0.3);
    --purple:#8b5cf6; --purple-dim:rgba(139,92,246,0.12); --purple-glow:rgba(139,92,246,0.3);
    --yellow:#eab308;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  header{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
  .brand{display:flex;align-items:center;gap:10px;}
  .logo-mark{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#000;}
  .brand-text{display:flex;flex-direction:column;line-height:1.2;}
  .brand-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
  .brand-sub{font-size:11px;color:var(--muted);}
  .header-right{display:flex;align-items:center;gap:8px;}
  .status-pill{display:flex;align-items:center;gap:6px;background:var(--green-dim);border:1px solid var(--green-glow);color:var(--green);font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;}
  .status-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
  .alert-counter{display:none;align-items:center;gap:5px;background:var(--red-dim);border:1px solid var(--red-glow);color:var(--red);font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;cursor:pointer;}
  .alert-counter:hover{background:rgba(239,68,68,0.2);}
  .alert-num{background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;}

  #breadcrumb{display:none;align-items:center;gap:6px;padding:7px 22px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);flex-shrink:0;}
  .bc-home{color:var(--green);cursor:pointer;transition:opacity 0.2s;}
  .bc-home:hover{opacity:0.7;}

  .main{flex:1;display:flex;overflow:hidden;}
  #chat{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  #chat::-webkit-scrollbar{width:3px;}
  #chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  #alertPanel{width:0;overflow:hidden;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
  #alertPanel.open{width:280px;}
  .ap-header{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .ap-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--red);}
  .ap-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;}
  .ap-close:hover{color:var(--text);}
  #alertList{overflow-y:auto;flex:1;padding:10px;display:flex;flex-direction:column;gap:8px;}
  .alert-card{background:var(--bg);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:11px 13px;animation:slideIn 0.3s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  .ac-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .ac-title{font-size:11px;font-weight:700;color:var(--red);font-family:'Syne',sans-serif;}
  .ac-time{font-size:10px;color:var(--muted);}
  .ac-f{display:flex;flex-direction:column;gap:1px;margin-bottom:4px;}
  .ac-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;}
  .ac-v{font-size:12px;font-weight:500;color:var(--text);}
  .ac-ch{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;}
  .ch{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;}
  .ch.email{background:rgba(59,130,246,0.15);color:var(--accent);border:1px solid rgba(59,130,246,0.3);}
  .ch.teams{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple-glow);}
  .ch.excel{background:var(--green-dim);color:var(--green);border:1px solid var(--green-glow);}

  .msg-row{display:flex;gap:9px;align-items:flex-end;opacity:0;animation:fadeUp 0.25s forwards;}
  .msg-row.user{flex-direction:row-reverse;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .avatar{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
  .avatar.bot{background:var(--green-dim);border:1px solid var(--green-glow);color:var(--green);font-weight:800;font-family:'Syne',sans-serif;}
  .avatar.user{background:#1a3a5c;border:1px solid rgba(59,130,246,0.3);color:var(--accent);font-size:10px;}
  .bubble{max-width:76%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.6;}
  .bubble.bot{background:#111f35;border:1px solid var(--border);border-bottom-left-radius:4px;}
  .bubble.user{background:#1a3a5c;border:1px solid rgba(59,130,246,0.2);border-bottom-right-radius:4px;}
  .bubble.alert-bubble{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.3);}

  .btn-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
  .btn-grid.cols2{display:grid;grid-template-columns:1fr 1fr;}
  .q-btn{padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all 0.18s;text-align:left;display:flex;align-items:center;gap:7px;}
  .q-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-dim);transform:translateY(-1px);}
  .q-btn.danger:hover{border-color:var(--red);color:var(--red);background:var(--red-dim);}
  .q-btn.soon{opacity:0.45;cursor:default;}
  .q-btn.soon:hover{border-color:var(--border);color:var(--text);background:var(--surface2);transform:none;}
  .q-btn .btn-icon{font-size:16px;flex-shrink:0;}
  .q-btn .btn-text{display:flex;flex-direction:column;gap:1px;}
  .q-btn .btn-label{font-weight:600;font-size:12px;}
  .q-btn .btn-desc{font-size:10px;color:var(--muted);font-weight:400;}
  .soon-badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:600;background:rgba(234,179,8,0.15);color:var(--yellow);border:1px solid rgba(234,179,8,0.3);margin-left:4px;}

  .info-card{margin-top:9px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;display:grid;grid-template-columns:1fr 1fr;gap:7px 12px;}
  .ic-row{display:flex;flex-direction:column;gap:2px;}
  .ic-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;}
  .ic-value{font-size:12.5px;font-weight:500;}
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
  .badge.en-camino{background:rgba(0,196,114,0.15);color:var(--green);border:1px solid var(--green-glow);}
  .badge.pendiente{background:rgba(234,179,8,0.15);color:var(--yellow);border:1px solid rgba(234,179,8,0.3);}
  .badge.completado{background:rgba(59,130,246,0.15);color:var(--accent);border:1px solid rgba(59,130,246,0.3);}
  .badge.cancelado{background:var(--red-dim);color:var(--red);border:1px solid var(--red-glow);}
  .badge.activo{background:var(--green-dim);color:var(--green);border:1px solid var(--green-glow);}
  .badge.mantenimiento{background:rgba(234,179,8,0.15);color:var(--yellow);border:1px solid rgba(234,179,8,0.3);}

  .alert-confirm{margin-top:9px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.25);border-radius:11px;padding:11px 13px;}
  .alert-confirm-title{font-size:11px;font-weight:700;color:var(--red);margin-bottom:7px;font-family:'Syne',sans-serif;}
  .alert-confirm-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;color:var(--muted);}
  .alert-confirm-row span:last-child{color:var(--text);font-weight:500;}
  .alert-confirm-channels{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;}

  .back-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:6px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
  .back-btn:hover{border-color:var(--green);color:var(--green);}

  /* Loading screen */
  #loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;transition:opacity 0.5s;}
  #loadingScreen.hidden{opacity:0;pointer-events:none;}
  .loading-logo{width:52px;height:52px;background:var(--green);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#000;}
  .loading-text{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text);}
  .loading-sub{font-size:12px;color:var(--muted);}
  .loading-bar{width:180px;height:3px;background:var(--border);border-radius:4px;overflow:hidden;}
  .loading-bar-fill{height:100%;background:var(--green);border-radius:4px;animation:loadBar 1.5s ease-in-out infinite;}
  @keyframes loadBar{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}

  #inputArea{display:none;padding:12px 22px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
  #inputArea.visible{display:block;}
  .input-wrap{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:9px 13px;transition:border-color 0.2s;}
  .input-wrap:focus-within{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim);}
  #userInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;line-height:1.5;}
  #userInput::placeholder{color:var(--muted);}
  #sendBtn{width:30px;height:30px;background:var(--green);border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
  #sendBtn:hover{background:#00e085;transform:scale(1.05);}
  #sendBtn svg{width:13px;height:13px;color:#000;}
  .input-hint{text-align:center;font-size:10px;color:var(--muted);margin-top:6px;}

  .typing{display:flex;gap:4px;align-items:center;padding:12px 14px;}
  .typing span{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:0.2s}.typing span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-5px);opacity:1}}

  #toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--red);color:#fff;padding:9px 18px;border-radius:30px;font-size:12px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

let RETIROS = [];
let DROPOFF = {};

// ── Carga datos desde Google Sheets ──────────────────────────
async function loadData() {
  const base = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/pub?output=csv&sheet=`;
  try {
    const [r, d, o] = await Promise.all([
      fetch(base + "retiros&t=" + Date.now(), {cache: "no-store"}).then(res => res.text()),
      fetch(base + "drop_off&t=" + Date.now(), {cache: "no-store"}).then(res => res.text()),
      fetch(base + "ordenes&t=" + Date.now(), {cache: "no-store"}).then(res => res.text())
    ]);
    RETIROS = csvToJson(r);
    csvToJson(d).forEach(row => DROPOFF[row.seller_id] = row);
    ORDENES = csvToJson(o);
  } catch(e) {
    console.warn("No se pudo cargar Google Sheets, usando datos de respaldo.", e);
    loadFallbackData();
  }
}

function csvToJson(csv) {
  const [h, ...rows] = csv.trim().split("\n");
  const keys = h.split(",").map(k => k.replace(/"/g,"").trim());
  return rows.filter(r => r.trim()).map(row => {
    const vals = row.split(",").map(v => v.replace(/"/g,"").trim());
    return Object.fromEntries(keys.map((k,i) => [k, vals[i] || null]));
  });
}

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let currentModule   = null;
let currentQuestion = null;
let pendingAction   = null;
let alertCount      = 0;
let panelOpen       = false;

// ═══════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════
function goHome() {
  currentModule = currentQuestion = pendingAction = null;
  hideInput();
  document.getElementById('breadcrumb').style.display = 'none';
  document.getElementById('chat').innerHTML = '';
  showMenu();
}

function setBreadcrumb(label) {
  const bc = document.getElementById('breadcrumb');
  bc.style.display = 'flex';
  document.getElementById('bcLabel').textContent = label;
}

function enterModule(id) {
  const mod = MODULES.find(m => m.id === id);
  if (!mod) return;
  currentModule = mod;
  setBreadcrumb(`${mod.icon} ${mod.label}`);
  userMsg(mod.label);
  after(300, () => showQuestions());
}

function showQuestions() {
  if (!currentModule) return;
  currentQuestion = null;
  hideInput();

  let btnsHtml = '';

  if (currentModule.id === 'alertas') {
    // Render grouped
    const groups = {};
    currentModule.questions.forEach(q => {
      const g = q.group || 'Otros';
      if (!groups[g]) groups[g] = [];
      groups[g].push(q);
    });
    const groupIcons = { 'Problemas de pickup':'🚨', 'Consultas':'🔍', 'Gestión':'⚙️' };
    Object.entries(groups).forEach(([gname, qs]) => {
      btnsHtml += `<div style="margin-top:12px;margin-bottom:4px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px">${groupIcons[gname]||''} ${gname}</div>`;
      btnsHtml += `<div class="btn-grid">`;
      btnsHtml += qs.map(q =>
        `<button class="q-btn danger" onclick="selectQuestion('${q.id}')">
          <span class="btn-icon">${q.icon}</span>
          <span class="btn-text"><span class="btn-label">${q.label}</span><span class="btn-desc">${q.desc}</span></span>
        </button>`
      ).join('');
      btnsHtml += `</div>`;
    });
  } else {
    btnsHtml = `<div class="btn-grid" style="margin-top:10px">` +
      currentModule.questions.map(q =>
        `<button class="q-btn ${currentModule.danger?'danger':''}" onclick="selectQuestion('${q.id}')">
          <span class="btn-icon">${q.icon}</span>
          <span class="btn-text"><span class="btn-label">${q.label}</span><span class="btn-desc">${q.desc}</span></span>
        </button>`
      ).join('') + `</div>`;
  }

  const intros = { retiros:'¿Qué quieres consultar sobre tu retiro?', dropoff:'¿Qué información necesitas de tu Punto Drop Off?', alertas:'¿Qué problema quieres reportar?' };
  botMsg(`${intros[currentModule.id]||'¿Qué consulta tienes?'}${btnsHtml}
    <div class="back-btn" style="margin-top:10px" onclick="goHome()">← Volver al menú</div>`);
}

function selectQuestion(qid) {
  currentQuestion = qid;
  const q = currentModule.questions.find(x => x.id === qid);
  userMsg(q?.label || qid);
  after(350, () => {
    if (currentModule.id === 'retiros')    askSellerId(sid => { typingThen(600, () => answerRetiro(sid, qid)); });
    if (currentModule.id === 'dropoff')    askSellerId(sid => { typingThen(600, () => answerDropoff(sid, qid)); });
    if (currentModule.id === 'alertas') {
      if (qid === 'contacto') {
        askSellerId(sid => {
          typingThen(400, () => {
            pendingAction = (telefono) => { typingThen(600, () => fireAlertContacto(sid, telefono)); };
            botMsg('¿Cuál es el <strong>nuevo número de contacto</strong> que quieres registrar?');
            showInput('Ej: +56912345678');
          });
        });
      } else {
        askSellerId(sid => { typingThen(700, () => fireAlert(sid, qid)); });
      }
    }
    if (currentModule.id === 'documentos') askOrders();
  });
}

// ═══════════════════════════════════════════════════════════════
//  SELLER ID INPUT
// ═══════════════════════════════════════════════════════════════
function askSellerId(then) {
  pendingAction = then;
  botMsg('¿Cuál es tu <strong>Seller ID</strong>? Lo encuentras en tu portal de vendedor.');
  showInput();
}

function showInput() {
  document.getElementById('inputArea').classList.add('visible');
  document.getElementById('userInput').value = '';
  after(100, () => document.getElementById('userInput').focus());
}

function hideInput() {
  document.getElementById('inputArea').classList.remove('visible');
  document.getElementById('userInput').value = '';
}

function submitInput() {
  const val = document.getElementById('userInput').value.trim();
  if (!val) return;
  hideInput();
  userMsg(val);
  if (pendingAction) { const fn = pendingAction; pendingAction = null; after(400, () => fn(val)); }
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function scrollToBottom() { const c=document.getElementById('chat'); c.scrollTo({top:c.scrollHeight,behavior:'smooth'}); }
function after(ms, fn) { setTimeout(fn, ms); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function botMsg(html, extraClass='') {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `<div class="avatar bot">F</div><div class="bubble bot ${extraClass}">${html}</div>`;
  chat.appendChild(row); scrollToBottom();
}

function userMsg(text) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="avatar user">TÚ</div><div class="bubble user">${esc(text)}</div>`;
  chat.appendChild(row); scrollToBottom();
}

function typingThen(ms, fn) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row'; row.id = 'typing-row';
  row.innerHTML = `<div class="avatar bot">F</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(row); scrollToBottom();
  after(ms, () => { row.remove(); fn(); });
}

function statusBadge(estado) {
  const cls = {'en camino':'en-camino','pendiente':'pendiente','completado':'completado','cancelado':'cancelado','activo':'activo','mantenimiento':'mantenimiento'}[(estado||'').toLowerCase()] || 'pendiente';
  return `<span class="badge ${cls}">${esc(estado)}</span>`;
}

function backBtn() {
  return `<div style="display:flex;gap:6px;margin-top:10px">
    <div class="back-btn" onclick="showQuestions()">← Otra consulta</div>
    <div class="back-btn" onclick="goHome()">🏠 Menú</div>
  </div>`;
}

function showMenu() {
  const cards = MODULES.map(m => {
    const soon = m.soon ? '<span class="soon-badge">Próximamente</span>' : '';
    const onclick = !m.soon ? `onclick="enterModule('${m.id}')"` : '';
    return `<button class="q-btn ${m.soon?'soon':''} ${m.danger?'danger':''}" ${onclick}>
      <span class="btn-icon">${m.icon}</span>
      <span class="btn-text"><span class="btn-label">${m.label}${soon}</span><span class="btn-desc">${m.desc}</span></span>
    </button>`;
  }).join('');
  botMsg(`¡Hola! ¿En qué puedo ayudarte hoy?<div class="btn-grid cols2" style="margin-top:10px">${cards}</div>`);
}

  if (!retiro) { botMsg(`No encontré retiros para el seller <strong>${esc(seller_id)}</strong>. Verifica tu ID o contáctanos.${backBtn()}`); return; }

  const n = retiro.nombre_seller;

  if (qid==='estado')
    botMsg(`Hola <strong>${esc(n)}</strong>, el estado de tu retiro del <strong>${retiro.fecha_retiro}</strong> es:<br><br>
      ${statusBadge(retiro.estado)} vía <strong>${esc(retiro.courier)}</strong> · ${retiro.paquetes} paquetes${backBtn()}`);

  else if (qid==='conductor')
    botMsg(`<strong>${esc(n)}</strong> · Retiro ${retiro.fecha_retiro}<br><br>
      ${retiro.conductor ? `El conductor asignado es <strong>${esc(retiro.conductor)}</strong>.` : `El conductor aún no ha sido asignado. Estado: ${statusBadge(retiro.estado)}.`}${backBtn()}`);

  else if (qid==='ventana')
    botMsg(`<strong>${esc(n)}</strong> · Retiro ${retiro.fecha_retiro}<br><br>
      Tu ventana horaria es de <strong>${esc(retiro.ventana_inicio)}</strong> a <strong>${esc(retiro.ventana_fin)} hrs</strong>.<br>
      Ten tu carga lista antes de las ${esc(retiro.ventana_inicio)}.${backBtn()}`);

  else if (qid==='todo')

        <div class="ic-row"><span class="ic-label">Conductor</span><span class="ic-value">${esc(retiro.conductor||'— Sin asignar')}</span></div>

        <div class="ic-row"><span class="ic-label">Ventana</span><span class="ic-value">${esc(retiro.ventana_inicio)} – ${esc(retiro.ventana_fin)}</span></div>
        <div class="ic-row"><span class="ic-label">Courier</span><span class="ic-value">${esc(retiro.courier)}</span></div>

function fireAlert(seller_id, qid) {
  // Smart routing: consultas redirigen al módulo correcto
  if (qid === 'datos' || qid === 'horario') {
    typingThen(500, () => {
      botMsg(`Te llevo directo al módulo de retiros para consultarlo.<div style="display:flex;gap:6px;margin-top:10px">
        <div class="back-btn" onclick="currentModule=MODULES.find(m=>m.id==='retiros');setBreadcrumb('🚚 Retiros logísticos');showQuestions()">🚚 Ir a Retiros</div>
        <div class="back-btn" onclick="goHome()">🏠 Menú</div>
      </div>`);
    });
    return;
  }
  // Incidencias reales → disparan alerta
  const retiro = RETIROS.find(r => r.seller_id===seller_id) || {};
  const hora = new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  const tipos = {
    atraso:        'Camión no llegó a tiempo',
    noshow:        'Pickup no fue realizado',
    transportista: 'Transportista no corresponde al informado',
    bloqueado:     'Transportista bloqueado',
    otro:          'Incidente operativo'
  };

  const alerta = {
    id: ++alertCount,
    seller_id,
    nombre_seller: retiro.nombre_seller || `Seller ${seller_id}`,
    patente: retiro.patente || 'No asignada',
    hora_reporte: hora,
    tipo: tipos[qid] || 'Incidente'
  };

  addAlertToPanel(alerta);
  showToast();

  // Mensaje especial para actualización de contacto
  const extraMsg = qid === 'contacto'
    ? `<br><br>Un ejecutivo te contactará para confirmar el nuevo número.`
    : qid === 'transportista'
    ? `<br><br>Por favor no entregues los paquetes hasta que el equipo confirme la identidad del transportista.`
    : qid === 'bloqueado'
    ? `<br><br>El equipo gestionará un nuevo transportista a la brevedad.`
    : '';

  botMsg(`Tu reporte fue recibido. El equipo de operaciones ya fue notificado.${extraMsg}
    <div class="alert-confirm">
      <div class="alert-confirm-title">🚨 Alerta #${alerta.id} registrada a las ${hora}</div>
      <div class="alert-confirm-row"><span>Seller</span><span>${esc(alerta.nombre_seller)} · ${seller_id}</span></div>
      <div class="alert-confirm-row"><span>Tipo</span><span>${esc(alerta.tipo)}</span></div>
      <div class="alert-confirm-row"><span>Patente</span><span>${esc(alerta.patente)}</span></div>
      <div class="alert-confirm-channels">
        <span class="ch email">📧 Email</span>
        <span class="ch teams">💬 Teams</span>
        <span class="ch excel">📊 Excel</span>
      </div>
    </div>${backBtn()}`, 'alert-bubble');
}

function askOrders() {
  pendingAction = processOrders;
  botMsg(`Ingresa los <strong>números de orden</strong> para los que necesitas el manifiesto.<br><br>
    Puedes separarlos por <strong>coma</strong>, <strong>espacio</strong> o <strong>Enter</strong>.<br><br>
    Ejemplo: <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:12px">ORD-100001, ORD-100002, ORD-100003</code>`);
  showInputMultiline();
}

function showInputMultiline() {
  const ia = document.getElementById('inputArea');
  ia.classList.add('visible');
  const inp = document.getElementById('userInput');
  inp.placeholder = 'ORD-100001, ORD-100002, ORD-100003...';
  inp.value = '';
  after(100, () => inp.focus());
}

function processOrders(raw) {
  // Parse order numbers — split by comma, space, or newline
  const orders = raw.split(/[,\s\n]+/).map(o => o.trim().toUpperCase()).filter(Boolean);

  if (!orders.length) {
    botMsg(`No detecté números de orden válidos. Inténtalo de nuevo.${backBtn()}`);
    return;
  }

  // Look up each order in ORDENES
  const found = [];
  const notFound = [];

  orders.forEach(ord => {
    const row = ORDENES.find(o => o.numero_orden && o.numero_orden.toUpperCase() === ord);
    if (row) found.push(row);
    else notFound.push(ord);
  });

  if (!found.length) {
    botMsg(`No encontré ninguna de estas órdenes en el sistema: <strong>${orders.join(', ')}</strong><br><br>
      Verifica los números e inténtalo de nuevo.${backBtn()}`);
    return;
  }

  // Generate Excel manifest
  generateManifest(found, notFound);
}

function generateManifest(rows, notFound) {
  const seller      = rows[0].nombre_seller || '—';
  const rut         = rows[0].rut_seller    || '—';
  const fecha       = new Date().toLocaleDateString('es-CL');
  const totalBultos = rows.reduce((s, r) => s + parseInt(r.cantidad_productos || 0), 0);

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const pw = 210, ml = 20, mr = 20, cw = pw - ml - mr;

  // ── Header ──────────────────────────────────────
  doc.setFillColor(30, 45, 69);
  doc.rect(ml, 14, cw, 12, 'F');
  doc.setTextColor(232, 237, 245);
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.text('MANIFIESTO DE CARGA PARA RECEPCION MKP FBS', pw/2, 21.5, {align:'center'});

  // ── Info seller ──────────────────────────────────
  doc.setTextColor(50,50,50);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');

  const infoY = 34;
  const labels = [['Seller:', seller],['RUT:', rut],['Fecha:', fecha]];
  labels.forEach(([lbl, val], i) => {
    const y = infoY + i*7;
    doc.setFont('helvetica','bold');
    doc.text(lbl, ml, y);
    doc.setFont('helvetica','normal');
    doc.text(val, ml + 20, y);
  });

  // ── Table header ─────────────────────────────────
  const tY = infoY + labels.length * 7 + 6;
  const cols = { orden: ml, lpn: ml+65, cant: ml+140 };
  const colW = { orden: 63, lpn: 73, cant: 27 };

  doc.setFillColor(30, 45, 69);
  doc.rect(ml, tY, cw, 8, 'F');
  doc.setTextColor(232, 237, 245);
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.text('Número de orden',       cols.orden + 2, tY + 5.2);
  doc.text('Número LPN (Label)',     cols.lpn   + 2, tY + 5.2);
  doc.text('Cant.',                  cols.cant  + 2, tY + 5.2);

  // ── Table rows ───────────────────────────────────
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  let rowY = tY + 8;
  rows.forEach((r, i) => {
    const bg = i % 2 === 0 ? [245,247,250] : [255,255,255];
    doc.setFillColor(...bg);
    doc.rect(ml, rowY, cw, 7, 'F');
    doc.setTextColor(50,50,50);
    doc.text(r.numero_orden  || '', cols.orden + 2, rowY + 4.8);
    doc.text(r.numero_lpn    || '—', cols.lpn  + 2, rowY + 4.8);
    doc.text(String(r.cantidad_productos || 0), cols.cant + 2, rowY + 4.8);

    // Cell borders
    doc.setDrawColor(200,205,215);
    doc.setLineWidth(0.2);
    doc.rect(cols.orden, rowY, colW.orden, 7);
    doc.rect(cols.lpn,   rowY, colW.lpn,   7);
    doc.rect(cols.cant,  rowY, colW.cant,   7);
    rowY += 7;
  });

  // ── Total row ────────────────────────────────────
  rowY += 2;
  doc.setFillColor(30, 45, 69);
  doc.rect(ml, rowY, cw, 8, 'F');
  doc.setTextColor(232, 237, 245);
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.text('Total de bultos', cols.orden + 2, rowY + 5.2);
  doc.text(String(totalBultos), cols.cant + 2, rowY + 5.2);

  // ── Footer ───────────────────────────────────────
  doc.setTextColor(150,150,150);
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.text('Falabella Marketplace · Generado automáticamente · ' + fecha, pw/2, 285, {align:'center'});

  // Download
  const filename = 'Manifiesto_' + seller.replace(/\s+/g,'_') + '_' + fecha.replace(/\//g,'-') + '.pdf';
  doc.save(filename);

// Show confirmation in chat
  const notFoundHtml = notFound.length
    ? `<br><br>⚠️ No encontradas: <strong>${notFound.join(', ')}</strong>`
    : '';

  const rowsHtml = rows.map(r =>
    `<div class="ic-row" style="grid-column:1/-1;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:4px">
      <span style="font-size:12px;color:var(--text)">${esc(r.numero_orden)}</span>
      <span style="font-size:11px;color:var(--muted)">${esc(r.numero_lpn||'—')} · ${r.cantidad_productos} uds</span>
    </div>`
  ).join('');

  botMsg(`✅ Manifiesto generado y descargado automáticamente.<br><br>
    <div class="info-card" style="grid-template-columns:1fr">
      <div class="ic-row"><span class="ic-label">Seller</span><span class="ic-value">${esc(seller)}</span></div>
      <div class="ic-row"><span class="ic-label">RUT</span><span class="ic-value">${esc(rut)}</span></div>
      <div class="ic-row"><span class="ic-label">Fecha</span><span class="ic-value">${fecha}</span></div>
      <div class="ic-row"><span class="ic-label">Órdenes incluidas</span><span class="ic-value">${rows.length}</span></div>
      <div class="ic-row"><span class="ic-label">Total bultos</span><span class="ic-value"><strong>${totalBultos}</strong></span></div>
    </div>
    ${notFoundHtml}
    <div style="margin-top:10px">
      <div class="back-btn" onclick="askOrders()">📄 Generar otro</div>
      <div class="back-btn" style="margin-left:6px" onclick="goHome()">🏠 Menú</div>
    </div>`);
}

// ═══════════════════════════════════════════════════════════════
//  ALERT PANEL
// ═══════════════════════════════════════════════════════════════
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('alertPanel').classList.toggle('open', panelOpen);
}

function addAlertToPanel(a) {
  const list = document.getElementById('alertList');
  const card = document.createElement('div');
  card.className = 'alert-card';
  card.innerHTML = `
    <div class="ac-hd"><div class="ac-title">🚨 Alerta #${a.id}</div><div class="ac-time">${a.hora_reporte}</div></div>
    <div class="ac-f"><span class="ac-l">Seller</span><span class="ac-v">${esc(a.nombre_seller)} · ${a.seller_id}</span></div>
    <div class="ac-f"><span class="ac-l">Patente</span><span class="ac-v">${esc(a.patente)}</span></div>
    <div class="ac-ch"><span class="ch email">📧 Email</span><span class="ch teams">💬 Teams</span><span class="ch excel">📊 Excel</span></div>`;
  list.prepend(card);
  document.getElementById('alertCounter').style.display = 'flex';
  document.getElementById('alertNum').textContent = alertCount;
  if (!panelOpen) togglePanel();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  await loadData();
  document.getElementById('loadingScreen').classList.add('hidden');
  setTimeout(showMenu, 300);
});
</script>
